<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Akash Ascent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <!-- Firebase Auth -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <!-- Firebase Database -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script type="module" src="firebase-init.js"></script>
    <style>
        .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">
    <div id="login-container" class="bg-white w-full max-w-sm p-8 rounded-lg card-shadow flex flex-col items-center">
        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center overflow-hidden mb-2">
            <img src="logo.png" alt="Logo" class="w-full h-full object-cover" />
        </div>
        <div id="title-container">
                <h1 id="main-title" class="text-xl font-bold tracking-tight text-gray-800 uppercase">Akash Ascent</h1>
                
            </div>



        <h2 class="text-2xl font-bold text-gray-800 mb-2">Login</h2>
        <p class="text-sm text-gray-500 mb-6">Sign in to your account</p>
        <form id="login-form" class="w-full flex flex-col gap-4">
            <div>
                <label for="username" class="block text-sm font-bold text-gray-700 mb-1">Username</label>
                <input id="username" name="username" type="text" required class="w-full p-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-400" placeholder="Enter your username">
            </div>
            <div>
                <label for="password" class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                <input id="password" name="password" type="password" required class="w-full p-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-400" placeholder="Enter your password">
            </div>
            <button type="submit" class="w-full py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 shadow-md font-medium text-sm mt-2">Login</button>
        </form>
        <div id="login-error" class="text-red-600 text-sm mt-2"></div>
        <div class="mt-6 pt-4 border-t border-gray-100 w-full text-center">
            <a href="account-deletion.html" class="text-sm font-medium text-blue-600 hover:text-blue-800 transition inline-flex items-center gap-1">
                <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                Request Account Deletion
            </a>
        </div>
</div>
<div id="firebase-status" class="mt-4 text-center text-sm"></div>
<script type="module" src="login.js"></script>
</body>
</html>
