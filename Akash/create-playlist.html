<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash Ascent - Create Playlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <!-- Firebase Database -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <!-- Firebase Storage -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
    <script src="firebase-init.js"></script>
    <style>
        .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
        .dashed-border { border: 2px dashed #cbd5e1; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-stretch justify-start font-sans">
    <div id="create-playlist" class="bg-white w-full min-h-screen p-6 lg:p-12 rounded-none lg:rounded-lg card-shadow relative">
        <div id="header-section" class="flex items-center gap-4 mb-12">
            <div id="logo-container" class="w-24 h-24 bg-white rounded-full flex items-center justify-center overflow-hidden">
                <img id="main-logo" src="logo.png" alt="Logo" class="w-full h-full object-cover" />
            </div>
            <div id="title-container" class="flex-1">
                <h1 id="main-title" class="text-2xl font-bold tracking-tight text-gray-800 uppercase">Akash Ascent</h1>
                <p id="main-tagline" class="text-md text-gray-800 italic">Create a new playlist for your courses.</p>
            </div>
            <div class="flex items-center gap-2 ml-auto">
                <a href="Dashboard.html" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition">Back</a>
                <button id="logout-btn" class="px-4 py-2 bg-red-500 text-white rounded-md hover:bg-red-600 transition">Logout</button>
            </div>
        </div>

        <form id="playlist-form" class="grid grid-cols-1 gap-8 lg:gap-10">
            <div class="grid grid-cols-1 xl:grid-cols-[1.2fr_1fr] gap-8">
                <div class="space-y-4">
                    <label class="block text-sm font-bold text-gray-700">Upload Thumbnail</label>
                    <div class="w-full aspect-[16/9] dashed-border rounded-xl flex items-center justify-center bg-gray-50 overflow-hidden relative">
                        <img id="thumbnail-preview" src="" alt="Thumbnail preview" class="absolute inset-0 w-full h-full object-cover hidden" />
                        <label class="relative flex flex-col items-center justify-center w-full h-full cursor-pointer text-gray-500">
                            <div class="flex flex-col items-center justify-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a4 4 0 004 4h10a4 4 0 004-4V7a4 4 0 00-4-4H7a4 4 0 00-4 4z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12l2 2 4-4" />
                                </svg>
                                <span>Click to upload thumbnail</span>
                            </div>
                            <input id="thumbnail-upload" name="thumbnail-upload" type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" />
                        </label>
                    </div>
                </div>

                <div class="space-y-6">
                    <div>
                        <label for="course-name" class="block text-sm font-bold text-gray-700 mb-1">Course Name</label>
                        <input id="course-name" name="course-name" type="text" placeholder="Enter course name" class="w-full p-3 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-400" />
                    </div>
                    <div>
                        <label for="course-description" class="block text-sm font-bold text-gray-700 mb-1">Course Description</label>
                        <textarea id="course-description" name="course-description" rows="6" placeholder="Enter course description" class="w-full p-3 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 resize-none"></textarea>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-full">
                <div>
                    <label for="course-author" class="block text-sm font-bold text-gray-700 mb-1">Author Name</label>
                    <input id="course-author" name="course-author" type="text" placeholder="e.g. Akash Ascent Team" class="w-full p-3 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-400" />
                </div>
                <div>
                    <label for="course-price" class="block text-sm font-bold text-gray-700 mb-1">Course Price (₹)</label>
                    <input id="course-price" name="course-price" type="number" placeholder="e.g. 499" class="w-full p-3 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-400" />
                </div>
                <div>
                    <label for="course-class" class="block text-sm font-bold text-gray-700 mb-1">Class</label>
                    <select id="course-class" name="course-class" class="w-full p-3 border border-gray-300 bg-white rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                        <option value="" disabled selected>Loading classes...</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button type="submit" class="w-full py-3 bg-blue-500 text-white rounded-md hover:bg-blue-600 transition font-medium">Create Playlist</button>
                </div>
            </div>
            <div id="upload-status" class="mt-4 text-sm text-gray-600"></div>
        </form>
    </div>

    <script src="logout.js"></script>
    <script src="create-playlist.js"></script>
</body>
</html>
