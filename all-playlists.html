<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash Ascent - All Playlists</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script type="module" src="firebase-init.js"></script>
    <style>
        .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen w-full font-sans overflow-x-hidden">
    <div class="min-h-screen w-full max-w-full mx-auto px-4 py-10 flex flex-col gap-8">
        <div id="header-section" class="flex flex-col md:flex-row items-start md:items-center gap-4 mb-12 w-full max-w-full">
            <div id="logo-container" class="w-24 h-24 bg-white rounded-full flex items-center justify-center overflow-hidden">
                <img id="main-logo" src="logo.png" alt="Logo" class="w-full h-full object-cover" />
            </div>
            <div id="title-container" class="flex-1">
                <h1 id="main-title" class="text-2xl md:text-3xl font-bold tracking-tight text-gray-900 uppercase">Akash Ascent</h1>
                <p id="main-tagline" class="text-base md:text-lg text-gray-800 italic">Learn. Grow. Succeed.</p>
            </div>
            <div class="flex items-center gap-2 ml-auto">
                <a href="Dashboard.html" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition">Back</a>
                <button id="logout-btn" class="px-4 py-2 bg-red-500 text-white rounded-md hover:bg-red-600 transition">Logout</button>
            </div>
        </div>
        <div class="w-full">
            <h2 class="text-4xl font-semibold text-gray-900">All Playlists</h2>
        </div>

        <div id="status-message" class="text-sm text-gray-600"></div>

        <!-- Preference Categories Filter Tabs -->
        <div id="preference-tabs" class="flex flex-wrap gap-2 w-full mt-4">
            <!-- Dynamically populated filter buttons -->
        </div>

        <div id="playlists-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 w-full mt-2"></div>
        <div id="empty-state" class="hidden rounded-3xl border border-dashed border-gray-300 bg-white p-10 text-center text-gray-500">
            <p class="text-lg font-medium">No playlists found yet.</p>
            <p class="mt-2">Create your first playlist from the New Course page.</p>
            <a href="create-playlist.html" class="inline-block mt-4 px-5 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition">Create Playlist</a>
        </div>

        <!-- Footer Section -->
        <footer id="footer-section" class="mt-auto pt-6 border-t border-gray-200 flex flex-col sm:flex-row items-center justify-between text-xs text-gray-500 gap-4">
            <div>
                © 2026 <span class="font-semibold text-gray-700">Akash Ascent</span>. All rights reserved.
            </div>
            <a href="https://rahul7873.github.io/portfolio-/" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 bg-blue-50 text-blue-700 px-3.5 py-1.5 rounded-full font-medium border border-blue-100 hover:bg-blue-100 hover:text-blue-800 transition shadow-sm">
                <span>💬 For any problem or technical assistance, please call the <span class="underline font-bold">developer</span>.</span>
            </a>
        </footer>
    </div>

    <script type="module" src="logout.js"></script>
    <script type="module" src="all-playlists.js"></script>
</body>
</html>
